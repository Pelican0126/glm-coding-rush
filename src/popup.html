<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GLM Coding 抢购助手</title>
  <style>
    /* ===== 主题变量：暗/亮自适应（跟随系统 prefers-color-scheme） ===== */
    :root {
      --bg: #ffffff;
      --bg-soft: #f5f6f8;
      --bg-elev: #ffffff;
      --border: #e3e6ea;
      --border-strong: #cfd4da;
      --text: #1c1f23;
      --text-soft: #5b626b;
      --text-mut: #8a9098;
      --accent: #2f6df6;
      --accent-soft: #e8f0ff;
      --ok: #16a34a;
      --ok-soft: #e7f6ec;
      --warn: #d97706;
      --warn-soft: #fdf1df;
      --err: #dc2626;
      --err-soft: #fbeaea;
      --info: #2563eb;
      --mono: ui-monospace, "SFMono-Regular", Menlo, Consolas, "Liberation Mono", monospace;
      --pill-idle: #8a9098;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #16181c;
        --bg-soft: #1d2025;
        --bg-elev: #22262c;
        --border: #2c3138;
        --border-strong: #3a4048;
        --text: #e8eaed;
        --text-soft: #b3b9c2;
        --text-mut: #7d848e;
        --accent: #5a8bff;
        --accent-soft: #1d2c4a;
        --ok: #34d27b;
        --ok-soft: #15301f;
        --warn: #f0a83a;
        --warn-soft: #3a2c12;
        --err: #f06262;
        --err-soft: #3a1b1b;
        --info: #6aa0ff;
        --pill-idle: #6b7280;
      }
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      width: 360px;
      max-height: 600px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", Roboto, Helvetica, Arial, sans-serif;
      font-size: 13px;
      line-height: 1.45;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ===== 顶部栏 ===== */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-elev);
      flex: 0 0 auto;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 13px;
    }
    .brand .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent);
    }
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      color: #fff;
      background: var(--pill-idle);
      white-space: nowrap;
      letter-spacing: .2px;
    }
    .status-pill .blink {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(255,255,255,.9);
    }
    .status-pill.live .blink { animation: blink 1s steps(2, start) infinite; }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: .25; } }

    /* ===== 验证码警告横幅 ===== */
    .captcha-banner {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: var(--warn-soft);
      color: var(--warn);
      border-bottom: 1px solid var(--border);
      font-weight: 700;
      font-size: 13px;
      animation: pulse 0.9s ease-in-out infinite;
    }
    .captcha-banner.show { display: flex; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .55; } }
    .captcha-banner .ico { font-size: 16px; }

    /* ===== 主体可滚动区域 ===== */
    .body {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ===== 倒计时卡片 ===== */
    .countdown {
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }
    .countdown .label {
      font-size: 11px;
      color: var(--text-mut);
      margin-bottom: 4px;
      letter-spacing: .3px;
    }
    .countdown .time {
      font-family: var(--mono);
      font-size: 30px;
      font-weight: 700;
      line-height: 1.1;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }
    .countdown.imminent .time { color: var(--accent); }
    .countdown .fireat {
      margin-top: 4px;
      font-size: 11px;
      color: var(--text-soft);
      font-family: var(--mono);
    }
    .countdown .offset {
      margin-top: 2px;
      font-size: 10px;
      color: var(--text-mut);
    }

    /* ===== 目标 / 标签信息 ===== */
    .meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .meta .cell {
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
    }
    .meta .cell.full { grid-column: 1 / -1; }
    .meta .k {
      font-size: 10px;
      color: var(--text-mut);
      text-transform: uppercase;
      letter-spacing: .4px;
      margin-bottom: 2px;
    }
    .meta .v {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      word-break: break-all;
    }
    .tabs-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .tab-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid var(--border-strong);
      color: var(--text-mut);
      background: transparent;
    }
    .tab-chip .ledot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--border-strong);
    }
    .tab-chip.active { color: var(--text); border-color: var(--accent); }
    .tab-chip.active .ledot { background: var(--accent); }
    .tab-chip.leader { color: var(--ok); border-color: var(--ok); }
    .tab-chip.leader .ledot { background: var(--ok); }

    /* ===== 按钮组 ===== */
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .btn {
      appearance: none;
      border: 1px solid var(--border-strong);
      background: var(--bg-elev);
      color: var(--text);
      border-radius: 8px;
      padding: 9px 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .12s, border-color .12s, opacity .12s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn:hover { border-color: var(--accent); }
    .btn:active { opacity: .8; }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .btn.primary:hover { filter: brightness(1.05); }
    .btn.danger {
      background: var(--err-soft);
      border-color: var(--err);
      color: var(--err);
    }
    .btn.warn {
      background: var(--warn-soft);
      border-color: var(--warn);
      color: var(--warn);
    }
    .btn.full { grid-column: 1 / -1; }

    /* Dry-run 开关行 */
    .switch-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
    }
    .switch-row .txt { display: flex; flex-direction: column; }
    .switch-row .txt .t1 { font-weight: 600; font-size: 12px; }
    .switch-row .txt .t2 { font-size: 10px; color: var(--text-mut); }
    .switch {
      position: relative;
      width: 40px; height: 22px;
      flex: 0 0 auto;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .switch .slider {
      position: absolute; inset: 0;
      background: var(--border-strong);
      border-radius: 999px;
      transition: background .15s;
      cursor: pointer;
    }
    .switch .slider::before {
      content: "";
      position: absolute;
      width: 16px; height: 16px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform .15s;
    }
    .switch input:checked + .slider { background: var(--warn); }
    .switch input:checked + .slider::before { transform: translateX(18px); }

    /* ===== 日志面板 ===== */
    .log-wrap {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .log-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .log-head .title {
      font-size: 11px;
      color: var(--text-mut);
      text-transform: uppercase;
      letter-spacing: .4px;
      font-weight: 700;
    }
    .log-head .mini-actions { display: flex; gap: 6px; }
    .mini-btn {
      appearance: none;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-soft);
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 11px;
      cursor: pointer;
    }
    .mini-btn:hover { border-color: var(--accent); color: var(--text); }
    .log-panel {
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: 8px;
      height: 180px;
      overflow-y: auto;
      padding: 6px 8px;
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.5;
    }
    .log-line {
      white-space: pre-wrap;
      word-break: break-word;
      padding: 1px 0;
      border-bottom: 1px solid transparent;
    }
    .log-line .ts { color: var(--text-mut); }
    .log-line .tag { color: var(--text-soft); }
    .log-line.info .msg { color: var(--text); }
    .log-line.success .msg { color: var(--ok); font-weight: 600; }
    .log-line.warn .msg { color: var(--warn); }
    .log-line.error .msg { color: var(--err); font-weight: 600; }
    .log-empty {
      color: var(--text-mut);
      font-style: italic;
      text-align: center;
      padding: 16px 0;
    }

    .footer {
      flex: 0 0 auto;
      padding: 6px 12px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-elev);
    }
    .footer .opt {
      font-size: 11px;
      color: var(--accent);
      cursor: pointer;
      text-decoration: none;
    }
    .footer .opt:hover { text-decoration: underline; }
    .footer .ver { font-size: 10px; color: var(--text-mut); }

    /* 滚动条精简 */
    .body::-webkit-scrollbar, .log-panel::-webkit-scrollbar { width: 8px; }
    .body::-webkit-scrollbar-thumb, .log-panel::-webkit-scrollbar-thumb {
      background: var(--border-strong); border-radius: 4px;
    }
  </style>
</head>
<body>
  <!-- 顶部：品牌 + 状态药丸 -->
  <div class="topbar">
    <div class="brand">
      <span class="dot"></span>
      <span>GLM 抢购助手</span>
    </div>
    <span id="statusPill" class="status-pill"><span class="blink"></span><span id="statusText">空闲</span></span>
  </div>

  <!-- 验证码人工接管警告横幅 -->
  <div id="captchaBanner" class="captcha-banner">
    <span class="ico">⚠️</span>
    <span>请立即在购买标签页完成「人机验证」！</span>
  </div>

  <div class="body">
    <!-- 倒计时 -->
    <div id="countdownCard" class="countdown">
      <div class="label">距开抢</div>
      <div id="countdownTime" class="time">--:--:--</div>
      <div id="fireAtText" class="fireat">未设定开抢时间</div>
      <div id="offsetText" class="offset"></div>
    </div>

    <!-- 目标信息 -->
    <div class="meta">
      <div class="cell">
        <div class="k">站点</div>
        <div id="mSite" class="v">-</div>
      </div>
      <div class="cell">
        <div class="k">套餐</div>
        <div id="mTier" class="v">-</div>
      </div>
      <div class="cell">
        <div class="k">周期</div>
        <div id="mPeriod" class="v">-</div>
      </div>
      <div class="cell">
        <div class="k">停点</div>
        <div id="mStop" class="v">-</div>
      </div>
      <div class="cell full">
        <div class="k">标签页</div>
        <div class="tabs-row" style="margin-top:4px;">
          <span id="chipPrimary" class="tab-chip"><span class="ledot"></span>主</span>
          <span id="chipBackup" class="tab-chip"><span class="ledot"></span>备</span>
          <span id="targetProduct" style="margin-left:auto;font-size:10px;color:var(--text-mut);font-family:var(--mono);"></span>
        </div>
      </div>
    </div>

    <!-- 操作按钮 -->
    <div class="actions">
      <button id="btnArm" class="btn primary">布防 Arm</button>
      <button id="btnDisarm" class="btn">撤防 Disarm</button>
      <button id="btnManual" class="btn warn full">手动开抢</button>
    </div>

    <!-- Dry-run 开关 -->
    <div class="switch-row">
      <div class="txt">
        <span class="t1">Dry-run 演练模式</span>
        <span class="t2">完整检测与计时，但绝不点击购买/确认</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="dryToggle" />
        <span class="slider"></span>
      </label>
    </div>

    <!-- 日志面板 -->
    <div class="log-wrap">
      <div class="log-head">
        <span class="title">实时日志</span>
        <div class="mini-actions">
          <button id="btnExport" class="mini-btn">导出</button>
          <button id="btnClear" class="mini-btn">清空</button>
        </div>
      </div>
      <div id="logPanel" class="log-panel">
        <div class="log-empty">暂无日志</div>
      </div>
    </div>
  </div>

  <div class="footer">
    <a id="openOptions" class="opt" href="#">设置 ⚙</a>
    <span id="verText" class="ver"></span>
  </div>

  <!-- 先加载共享库（logger 提供 fmt），再加载 popup 逻辑 -->
  <script src="logger.js"></script>
  <script src="popup.js"></script>
</body>
</html>
